<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proportional Font Chord Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&family=Assistant:wght@400;600;700&family=Cousine:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rubik', sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { text-align: center; margin-bottom: 10px; font-size: 1.3rem; }
    .controls {
      text-align: center; margin-bottom: 15px;
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    }
    .controls button {
      padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px;
      cursor: pointer; font-size: 0.85rem; background: white;
    }
    .controls button.active { background: #2196F3; color: white; border-color: #1976D2; }

    .comparison {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
      max-width: 1600px; margin: 0 auto;
    }
    .panel {
      border: 1px solid #ddd; border-radius: 8px; padding: 12px; background: white; overflow: hidden;
    }
    .panel h2 { text-align: center; font-size: 1rem; margin-bottom: 8px; color: #333; }

    /* ===========================================================
       RIGHT PANEL: Exact replica of production chords rendering
       =========================================================== */
    #mono-out {
      font-family: 'Cousine', 'Courier New', Courier, monospace;
      font-weight: 700;
      padding: 0.25rem;
      line-height: 1.15;
      overflow: hidden;
    }
    #mono-out .line {
      min-height: 0.9em;
      white-space: pre;
    }
    #mono-out .line-chords .chords {
      color: #0000ff;
      font-weight: 700;
    }
    #mono-out .line-directive .directive {
      color: green;
      font-weight: 600;
    }
    #mono-out .line-lyric .lyric {
      color: #1a1a1a;
    }
    #mono-out.rtl .line-chords {
      direction: ltr;
      text-align: right;
      unicode-bidi: bidi-override;
    }
    #mono-out.rtl {
      direction: rtl;
    }
    #mono-out.ltr {
      direction: ltr;
    }
    #mono-out .lyrics-section {
      break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 0.8em;
    }

    /* ===========================================================
       LEFT PANEL: Proportional font with anchor-based chords
       =========================================================== */
    #prop-out {
      font-family: 'Assistant', 'Rubik', sans-serif;
      font-weight: 600;
      font-size: 1.25em;
      padding: 0.25rem;
      line-height: 1.3;
      overflow: hidden;
    }
    #prop-out.rtl {
      direction: rtl;
    }
    #prop-out.ltr {
      direction: ltr;
    }
    #prop-out .lyrics-section {
      break-inside: avoid;
      margin-bottom: 0.5em;
    }
    #prop-out .line-directive .directive {
      color: green;
      font-weight: 600;
    }
    #prop-out .line-lyric .lyric {
      color: #1a1a1a;
    }
    #prop-out .line {
      min-height: 0.9em;
    }
    /* Chord-lyric combined line */
    #prop-out .chord-lyric-line {
      color: #1a1a1a;
      line-height: 1.8;
      white-space: pre;
    }
    #prop-out .chord-anchor {
      position: relative;
    }
    #prop-out .chord-label {
      position: absolute;
      bottom: 0.8em;
      color: #0000ff;
      font-weight: 700;
      font-size: 0.85em;
      white-space: nowrap;
      direction: ltr;
      unicode-bidi: isolate;
    }
    #prop-out.rtl .chord-label {
      right: 0;
    }
    #prop-out.ltr .chord-label {
      left: 0;
    }
    /* Standalone chord line (no lyric below) */
    #prop-out .line-chords {
      font-family: 'Cousine', 'Courier New', Courier, monospace;
      white-space: pre;
      color: #0000ff;
      font-weight: 700;
      min-height: 0.9em;
      line-height: 1.15;
      font-size: 0.8em;
    }
    #prop-out.rtl .line-chords {
      direction: ltr;
      text-align: right;
      unicode-bidi: bidi-override;
    }
  </style>
</head>
<body>
  <h1>Proportional vs Monospace — Chord Alignment Demo</h1>
  <div class="controls">
    <button onclick="showSong('hebrew1')" id="btn-hebrew1" class="active">אהבה קטנה (RTL)</button>
    <button onclick="showSong('hebrew2')" id="btn-hebrew2">פסק זמן (RTL)</button>
    <button onclick="showSong('english')" id="btn-english">50 Ways (LTR)</button>
  </div>

  <div class="comparison">
    <div class="panel">
      <h2>Proportional Font (New)</h2>
      <div id="prop-out"></div>
    </div>
    <div class="panel">
      <h2>Monospace (Current — Production Replica)</h2>
      <div id="mono-out"></div>
    </div>
  </div>

  <script>
    const songs = {
      hebrew1: {
        direction: 'rtl',
        lines: [
          { type: 'directive', text: 'רק פסנתר' },
          { type: 'chords', text: 'Em     D     C' },
          { type: 'chords', text: 'Em     D     C' },
          { type: 'empty' },
          { type: 'directive', text: 'כולם מצטרפים' },
          { type: 'chords', text: 'Em        C      G      D' },
          { type: 'lyric',  text: '    אואואואו אואואו' },
          { type: 'chords', text: 'Em        C      G      D      D' },
          { type: 'lyric',  text: '    אואואואו אואואו' },
          { type: 'empty' },
          { type: 'directive', text: 'שקט, בלי תופים' },
          { type: 'chords', text: '     Em            D      C' },
          { type: 'lyric',  text: 'אני למעלה עכשיו, הפסקתי ליפול' },
          { type: 'chords', text: '  Em           D         C' },
          { type: 'lyric',  text: 'תעלם, תתרחק, תפסיק כבר לשאול' },
          { type: 'chords', text: '     G           D       C' },
          { type: 'lyric',  text: 'ענן שחור מאובק גורם לי לחשוב' },
          { type: 'chords', text: '    Em             D     C' },
          { type: 'lyric',  text: 'מי למעלה החליט שזה טוב לאהוב?' },
          { type: 'empty' },
          { type: 'directive', text: 'תופים נכנסים' },
          { type: 'chords', text: '       Em             D      C' },
          { type: 'lyric',  text: "תרים ת'ראש ותביט בי, תגיד שנגמר" },
          { type: 'chords', text: '     Em          D      C' },
          { type: 'lyric',  text: 'אתה בטוח חושב, אהיה פה מחר' },
          { type: 'chords', text: '      G         D          C' },
          { type: 'lyric',  text: 'אז לפחות תשקר, תגיד שאתה אוהב' },
          { type: 'chords', text: '     Em            D   C' },
          { type: 'lyric',  text: 'ממש כמו מכונה אין קשר ללב' },
          { type: 'empty' },
          { type: 'chords', text: '       Em             C' },
          { type: 'lyric',  text: 'אז מה יהיה איתך עם המשחק שלך' },
          { type: 'chords', text: ' G       D' },
          { type: 'lyric',  text: 'מסך ההתעלמות שלא' },
          { type: 'chords', text: ' Em              C' },
          { type: 'lyric',  text: 'הורג אותך, הוא מחשל אותך' },
          { type: 'chords', text: 'G        D        C     C/C#' },
          { type: 'lyric',  text: 'אין לי אהבה קטנה לתת לך' },
          { type: 'chords', text: 'D       D/Eb' },
          { type: 'lyric',  text: 'אין לי אהבה קטנה' },
        ]
      },
      hebrew2: {
        direction: 'rtl',
        lines: [
          { type: 'chords', text: 'Em         A        D         Dmaj7' },
          { type: 'lyric',  text: '      לקחת פסק זמן ולא לחשוב' },
          { type: 'chords', text: 'Em          A       D          C#7' },
          { type: 'lyric',  text: '      לשבת מול הים ולא לדאוג' },
          { type: 'chords', text: 'F#m        G#7     C#m    A7' },
          { type: 'lyric',  text: '      לתת לראש לנוח מהפיצוצים' },
          { type: 'chords', text: 'D         C#7     F#m  A7' },
          { type: 'lyric',  text: '      לתת ללב לנוח מהלחצים' },
          { type: 'empty' },
          { type: 'chords', text: 'Em         A        D         Dmaj7' },
          { type: 'lyric',  text: '      להסתכל על הים ולראות אניה' },
          { type: 'chords', text: 'Em          A       D          C#7' },
          { type: 'lyric',  text: '      חולמת שהיא באה אליי' },
          { type: 'chords', text: 'F#m        G#7     C#m    A7' },
          { type: 'lyric',  text: '      שזה אפשרי שזה עוד יקרה' },
          { type: 'chords', text: 'D         C#7     F#m  A7' },
          { type: 'lyric',  text: '      שמישהי עוד תעשה לי טוב' },
        ]
      },
      english: {
        direction: 'ltr',
        lines: [
          { type: 'directive', text: 'Rest Join' },
          { type: 'chords', text: 'Am             Dm' },
          { type: 'lyric',  text: '   My heart is paralyzed' },
          { type: 'chords', text: 'G              C' },
          { type: 'lyric',  text: '   My head was oversized' },
          { type: 'chords', text: 'F                Dm                 E7' },
          { type: 'lyric',  text: "   I'll take the high road like I should" },
          { type: 'chords', text: 'Am               Dm' },
          { type: 'lyric',  text: "   You said it's meant to be" },
          { type: 'chords', text: 'G                 C' },
          { type: 'lyric',  text: "   That it's not you, it's me" },
          { type: 'chords', text: 'F                 Dm              E7' },
          { type: 'lyric',  text: "   You're leaving now for my own good" },
          { type: 'empty' },
          { type: 'chords', text: '          F' },
          { type: 'lyric',  text: 'She went down in an airplane' },
          { type: 'chords', text: '  C' },
          { type: 'lyric',  text: 'Fried getting suntan' },
          { type: 'chords', text: 'G                   Am              G' },
          { type: 'lyric',  text: '   Fell in a cement mixer full of quicksand' },
          { type: 'chords', text: ' F                C                 Bm      E7' },
          { type: 'lyric',  text: "Help me, help me I'm no good at goodbyes" },
        ]
      }
    };

    function escHtml(t) {
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Replicate production backend: reverse chord line for RTL display
    // The CSS bidi-override + ltr + text-align:right then renders it correctly
    function reverseChordLineForRtl(line) {
      var reversed = line.split('').reverse().join('');
      return reversed.replace(/\S+/g, function(token) {
        if (token.startsWith('}') && token.endsWith('{')) {
          var content = token.slice(1, -1);
          var hasHebrew = new RegExp('[\\u0590-\\u05FF]').test(content);
          if (hasHebrew) return '{' + content + '}';
          return '{' + content.split('').reverse().join('') + '}';
        }
        return token.split('').reverse().join('');
      });
    }

    // Parse chord positions from a chord line string
    // Returns array of { chord: string, position: number }
    function parseChordPositions(chordLine) {
      const chords = [];
      let i = 0;
      while (i < chordLine.length) {
        if (chordLine[i] !== ' ') {
          const start = i;
          while (i < chordLine.length && chordLine[i] !== ' ') i++;
          chords.push({ chord: chordLine.substring(start, i), position: start });
        } else {
          i++;
        }
      }
      return chords;
    }

    // Build anchor-based HTML for a chord+lyric pair (SyncTheBand approach)
    // Chords are anchored at their character position in the lyric.
    // If chord line is wider than lyric, pad lyric with spaces so all chords have anchors.
    function renderChordLyricLine(chordText, lyricText, direction) {
      const chords = parseChordPositions(chordText);
      const isRtl = direction === 'rtl';

      // Trim leading whitespace from lyrics (only needed for monospace alignment)
      const leadingSpaces = lyricText.match(/^ */)[0].length;
      let trimmedLyric = lyricText.trimStart();

      // Adjust chord positions: subtract leading spaces, clamp to 0
      const adjustedChords = chords.map(c => ({
        chord: c.chord,
        position: Math.max(0, c.position - leadingSpaces)
      }));

      // Pad lyric with spaces if chords extend beyond it
      const maxChordPos = adjustedChords.length > 0
        ? adjustedChords[adjustedChords.length - 1].position + 1
        : 0;
      if (maxChordPos > trimmedLyric.length) {
        trimmedLyric = trimmedLyric + ' '.repeat(maxChordPos - trimmedLyric.length);
      }

      let html = '';
      let lastIdx = 0;

      for (const { chord, position } of adjustedChords) {
        // Text segment before this anchor
        if (position > lastIdx) {
          html += `<span>${escHtml(trimmedLyric.substring(lastIdx, position))}</span>`;
        }

        // Anchor character with chord above it
        const anchorChar = trimmedLyric[position];
        html += `<span class="chord-anchor">${escHtml(anchorChar)}<span class="chord-label">${escHtml(chord)}</span></span>`;
        lastIdx = Math.max(lastIdx, position + 1);
      }

      // Remaining lyric text after last chord
      if (lastIdx < trimmedLyric.length) {
        html += `<span>${escHtml(trimmedLyric.substring(lastIdx))}</span>`;
      }

      return `<div class="line chord-lyric-line">${html}</div>`;
    }

    // Render proportional panel with anchor-based chord positioning
    function renderProportional(song) {
      const lines = song.lines;
      const direction = song.direction;
      let html = '<div class="lyrics-section">';
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];

        if (line.type === 'empty') {
          html += '</div><div class="lyrics-section">';
          i++;
        } else if (line.type === 'directive') {
          html += `<div class="line line-directive"><span class="directive">{${escHtml(line.text)}}</span></div>`;
          i++;
        } else if (line.type === 'chords') {
          // Check if next line is a lyric (chord-lyric pair)
          if (i + 1 < lines.length && lines[i + 1].type === 'lyric') {
            html += renderChordLyricLine(line.text, lines[i + 1].text, direction);
            i += 2;
          } else {
            // Standalone chord line (no lyric below) - reverse for RTL like production
            const text = (direction === 'rtl') ? reverseChordLineForRtl(line.text) : line.text;
            html += `<div class="line line-chords"><span class="chords">${escHtml(text)}</span></div>`;
            i++;
          }
        } else if (line.type === 'lyric') {
          // Standalone lyric (no chord above)
          html += `<div class="line line-lyric"><span class="lyric">${escHtml(line.text)}</span></div>`;
          i++;
        } else {
          i++;
        }
      }

      html += '</div>';
      return html;
    }

    // Render monospace panel (exact production replica)
    function renderMonospace(song) {
      const lines = song.lines;
      const isRtl = song.direction === 'rtl';
      let html = '<div class="lyrics-section">';

      for (const line of lines) {
        if (line.type === 'empty') {
          html += '</div><div class="lyrics-section">';
        } else if (line.type === 'directive') {
          html += `<div class="line line-directive"><span class="directive">{${escHtml(line.text)}}</span></div>`;
        } else if (line.type === 'chords') {
          const text = isRtl ? reverseChordLineForRtl(line.text) : line.text;
          html += `<div class="line line-chords"><span class="chords">${escHtml(text)}</span></div>`;
        } else if (line.type === 'lyric') {
          html += `<div class="line line-lyric"><span class="lyric">${escHtml(line.text)}</span></div>`;
        }
      }

      html += '</div>';
      return html;
    }

    function showSong(key) {
      const song = songs[key];

      // Left panel — proportional with anchor-based chords
      const propEl = document.getElementById('prop-out');
      propEl.innerHTML = renderProportional(song);
      propEl.className = song.direction;

      // Right panel — production replica (monospace)
      const monoEl = document.getElementById('mono-out');
      monoEl.innerHTML = renderMonospace(song);
      monoEl.className = song.direction;

      // Button state
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${key}`).classList.add('active');
    }

    showSong('hebrew1');
  </script>
</body>
</html>
